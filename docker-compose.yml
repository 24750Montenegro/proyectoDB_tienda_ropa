services:
  db:
    image: postgres:16
    container_name: tienda_ropa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/tienda_ropa.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/tienda_ropa_datos.sql:/docker-entrypoint-initdb.d/02_datos.sql:ro
      - ./database/tienda_ropa_vistas.sql:/docker-entrypoint-initdb.d/03_vistas.sql:ro
      - ./database/tienda_ropa_procedimientos.sql:/docker-entrypoint-initdb.d/04_procedimientos.sql:ro
      - ./database/tienda_ropa_usuarios.sql:/docker-entrypoint-initdb.d/05_usuarios.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: tienda_ropa_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT_INTERNAL: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      BACKEND_PORT: ${BACKEND_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  frontend:
    build: ./frontend
    container_name: tienda_ropa_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:${BACKEND_PORT}/api"
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  pgdata:
