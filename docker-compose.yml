services:
  db:
    image: postgres:16
    container_name: tienda_ropa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./tienda_ropa.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./tienda_ropa_datos.sql:/docker-entrypoint-initdb.d/02_datos.sql:ro
      - ./tienda_ropa_vistas.sql:/docker-entrypoint-initdb.d/03_vistas.sql:ro
      - ./tienda_ropa_procedimientos.sql:/docker-entrypoint-initdb.d/04_procedimientos.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
